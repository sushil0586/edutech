appId: com.anonymous.nexorastudentmobile
---
# Seed expectation:
# - the app is already open on the login screen before disabling network
# - this flow is intended for offline registration-setup validation only in a warm app session

- assertVisible: "Login"

- tapOn: "Register"

- extendedWaitUntil:
    visible: "Student Register"
    timeout: 30000

- assertVisible: "Registration setup needs attention"
- assertVisible: "We could not reach the Nexora server. Check your internet connection and try again."
- assertVisible: "Retry setup"
