name: Edutech Web Playwright Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "edutech_web/**"
      - ".github/workflows/edutech-web-playwright-smoke.yml"

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edutech_web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve smoke environment
        id: smoke-env
        shell: bash
        run: |
          if [ -z "${{ secrets.PLAYWRIGHT_BASE_URL }}" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Playwright smoke run because PLAYWRIGHT_BASE_URL is not configured."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.smoke-env.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edutech_web/package-lock.json

      - name: Install dependencies
        if: steps.smoke-env.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.smoke-env.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        if: steps.smoke-env.outputs.should_run == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_INSTITUTE_USERNAME: ${{ secrets.PLAYWRIGHT_INSTITUTE_USERNAME }}
          PLAYWRIGHT_INSTITUTE_PASSWORD: ${{ secrets.PLAYWRIGHT_INSTITUTE_PASSWORD }}
          PLAYWRIGHT_TEACHER_USERNAME: ${{ secrets.PLAYWRIGHT_TEACHER_USERNAME }}
          PLAYWRIGHT_TEACHER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEACHER_PASSWORD }}
          PLAYWRIGHT_STUDENT_USERNAME: ${{ secrets.PLAYWRIGHT_STUDENT_USERNAME }}
          PLAYWRIGHT_STUDENT_PASSWORD: ${{ secrets.PLAYWRIGHT_STUDENT_PASSWORD }}
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always() && steps.smoke-env.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: edutech-web-playwright-report
          path: |
            edutech_web/playwright-report
            edutech_web/test-results
          if-no-files-found: ignore
